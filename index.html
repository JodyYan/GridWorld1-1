<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate n x n Square</title>
    <link rel="stylesheet" href="./static/style.css">
</head>

<body>
    <div class="container">
        <h4>HW1-1 網格地圖開發 60%</h4>
        <h1>Generate n x n Square</h1>

        <div class="controls">
            <label for="grid-size">Enter a number between 5 and 9:</label>
            <input type="number" id="grid-size" min="5" max="9">
            <button id="generate-btn">Generate Square</button>
        </div>

        <div id="grid-section" style="display: none;">
            <h2 id="grid-title"></h2>
            <p>1. Click on a cell to set up the start grid as green or the end grid as red.<br>2. Set up exactly n-2
                obstacles as gray.</p>
            <div id="grid-container"></div>
        </div>
    </div>

    <script src="./static/script.js"></script>
</body>

</html>
